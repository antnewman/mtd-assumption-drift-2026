# The assumption register for the MTD 2026 investigation
# Each entry maps to one row in mtd_2026.assumptions
# source_document references citation_key in sources.yaml

assumptions:
  - assumption_key: transitional_cost_50k_cohort
    assumption_label: "Average transitional cost per £50k-cohort business"
    assumption_description: >
      HMRC's estimate of the average one-off compliance cost incurred by a
      business in the above-£50k Self Assessment cohort as a consequence of
      meeting MTD for ITSA obligations from April 2026. Derived using HMRC's
      Standard Cost Model methodology. Includes time spent on familiarisation,
      in-house training, hardware upgrades where applicable, and additional
      accountancy costs. Excludes continuing costs (which are captured in a
      separate annual compliance cost figure).
    value: 285.00
    unit: gbp_per_business
    baseline_date: 2024-02-22
    pricing_base_year: 2021
    source_document: HMRC-TIIN-MTD-ITSA-2024-02
    source_location: "Section 'Impact on business including civil society organisations': 'Estimated one-off impact on administrative burden' table, 'Above £50,000 threshold' column"
    is_primary: true
    is_superseded: false
    pac_recommendation_ref: "PAC-MTD-2023 Conclusion 4 and associated recommendation"
    notes: >
      This is the primary assumption under investigation. The PAC specifically
      asked HMRC to reassess this figure taking inflation into account. The
      underlying Standard Cost Model research pre-dates the baseline date of
      the TIIN; the 2024-02 TIIN is the first publication of this figure as
      the authoritative HMRC position.

  - assumption_key: transitional_cost_total_30k_plus
    assumption_label: "Total transitional cost for above-£30k population"
    assumption_description: >
      The aggregate one-off compliance cost estimate for the total mandated
      population above the £30k threshold (covering both the April 2026
      £50k cohort and the April 2027 £30k-£50k cohort). Equals the
      per-cohort averages multiplied by the respective populations.
    value: 561000000.00
    unit: gbp
    baseline_date: 2024-02-22
    pricing_base_year: 2021
    source_document: HMRC-TIIN-MTD-ITSA-2024-02
    source_location: "'Estimated one-off impact on administrative burden' table, 'Total mandated population above £30,000' column, 'Costs' row"
    is_primary: false
    is_superseded: false
    pac_recommendation_ref: "PAC-MTD-2023 Conclusion 4"
    notes: >
      A cross-check on the primary assumption: value should approximately
      equal transitional_cost_50k_cohort * population_50k_cohort, plus the
      equivalent for the £30k-£50k cohort. Breakdown per TIIN: £223m for
      the above-£50k threshold and £338m for the £30k-£50k threshold.

  - assumption_key: population_50k_cohort
    assumption_label: "In-scope population at £50k threshold from April 2026"
    assumption_description: >
      HMRC's estimate of the number of sole traders and landlords with
      qualifying income above £50,000 who will be mandated into MTD for ITSA
      from 6 April 2026. Derived from HMRC Self Assessment return data.
    value: 780000
    unit: count
    baseline_date: 2024-02-22
    source_document: HMRC-TIIN-MTD-ITSA-2024-02
    source_location: "Section 'Impact on business including civil society organisations': 'Who is affected' paragraph"
    is_primary: false
    is_superseded: false
    notes: >
      A further 970,000 people in the £30k-£50k band are expected to join
      from April 2027 (same source). The April 2028 £20k cohort is
      estimated at approximately 970,000 additional individuals per the
      separate March 2025 TIIN (HMRC-TIIN-MTD-ITSA-2028-20k).

  - assumption_key: self_assessment_tax_gap
    assumption_label: "Self Assessment tax gap"
    assumption_description: >
      HMRC's estimate of the tax gap for Self Assessment businesses, cited
      in the TIIN's policy objective section as motivation for MTD for ITSA.
      Expressed as both a percentage of theoretical SA liability and an
      absolute figure.
    value: 18.50
    unit: percent
    baseline_date: 2024-02-22
    source_document: HMRC-TIIN-MTD-ITSA-2024-02
    source_location: "Section 'Policy objective', paragraph 2"
    is_primary: false
    is_superseded: false
    notes: >
      Value also stated in absolute terms as approximately £5bn. This
      assumption supports the additional tax revenue side of the business
      case. Cross-check against HMRC-MTG-2025 is a consistency check,
      not a drift calculation, because of the two-year lag in tax gap
      estimates.

  - assumption_key: programme_roi
    assumption_label: "Overall MTD Programme return on investment"
    assumption_description: >
      The headline return on investment ratio for the MTD Programme as a
      whole, comparing exchequer benefits to HMRC (government) programme
      costs, excluding customer costs in line with Green Book guidance.
      The associated overall benefit-cost ratio (BCR), which does include
      customer costs, is 1.3:1.
    value: 3.80
    unit: ratio
    baseline_date: 2025-06-04
    source_document: HMRC-AOA-MTD-2025-06
    source_location: "Section 3 (Value for money), paragraph discussing 'overall BCR' and 'ROI', directly after reference to CIDC and HMT approval"
    is_primary: false
    is_superseded: false
    notes: >
      The BCR dropped from 2.2:1 to 1.3:1 and the ROI from 4.8:1 to 3.8:1
      between the April 2024 AOA and the June 2025 AOA. HMRC attributes
      this to the inclusion of full lifecycle customer costs, scope
      changes, and updated ATR and customer cost estimates. The drop is
      itself evidence that HMRC has operationalised the PAC's recommendation
      to be more open about customer costs.